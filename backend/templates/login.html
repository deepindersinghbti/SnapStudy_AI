{% extends 'base.html' %}

{% block title %}SnapStudy | Login{% endblock %}

{% block content %}
<section class="card auth-card narrow">
    <h1>Login</h1>
    <p class="sub">Welcome back. Sign in to access your dashboard.</p>

    <form id="login-form" class="stack">
        <label>Email
            <input type="email" id="login-email" placeholder="test@example.com" required>
        </label>
        <label>Password
            <input type="password" id="login-password" minlength="6" required>
        </label>
        <button type="submit" id="login-btn">Login</button>
    </form>

    <p class="inline-note">No account yet? <a href="/register">Create one here</a>.</p>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', path='js/login.js') }}"></script>
{% endblock %}
